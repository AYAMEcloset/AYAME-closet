<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Ayame closet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background-color: #f5f3ef;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #fff;
    }

    .menu-btn {
      font-size: 24px;
      cursor: pointer;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background: #fff;
      padding: 20px;
      transition: 0.3s;
    }

    .menu a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      color: #333;
    }

    .menu.active {
      left: 0;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      display: none;
    }

    .overlay.active {
      display: block;
    }

    .container {
      text-align: center;
      padding: 80px 20px;
    }
  </style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div>Ayame closet</div>
</header>

<div class="menu" id="menu">
  <a href="#">ログイン</a>
  <a href="#">新規会員登録</a>

  <hr>

  <a href="index.html">HOME</a>
  <a href="about.html">ABOUT</a>
  <a href="category.html">CATEGORY</a>
  <a href="info.html">Information</a>

  <hr>

  <a href="all.html">All item</a>
  <a href="tops.html">tops</a>
  <a href="bottom.html">bottom</a>
  <a href="skirt.html">skirt</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="container">
  <h1>Ayame closet</h1>
  <p>子供服と雑貨のお店</p>
</div>

<script>
  function openMenu() {
    document.getElementById("menu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
  }

  function closeMenu() {
    document.getElementById("menu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
  }
</script>

</body>
</html>
